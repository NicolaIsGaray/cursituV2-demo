<nav class="top-nav">
  <button class="btn-back" (click)="goBack()">
    <span class="material-symbols-outlined">arrow_back</span>
    Regresar
  </button>
</nav>
<div class="presentations-container" *ngIf="authService.userRole$ | async as rol">
  <!-- Panel de Creación -->
  <section class="create-section">
    <h2>Crear Presentación</h2>

    <!-- Solo visible para Alumnos -->
    <div class="form-group" *ngIf="rol === 'ALUMNO'">
      <div class="label-container">
        <span class="label-main">Subir presentación</span>
        <span class="label-hint">Solo formatos ".pdf" o ".pptx"</span>
      </div>
      <button class="upload-btn">
        <span class="material-symbols-outlined">add_circle</span>
      </button>
    </div>

    <!-- Solo visible para Docentes -->
    <div class="docente-controls" *ngIf="rol === 'DOCENTE'">
      <div class="label-main" style="margin-bottom: 15px">Método de organización</div>
      <div class="method-selector">
        <button (click)="metodo = 'orden'" [class.active]="metodo === 'orden'">En Orden</button>
        <button (click)="metodo = 'sorteo'" [class.active]="metodo === 'sorteo'">Sorteo</button>
      </div>

      <!-- VISTA: EN ORDEN -->
      <div class="method-view" *ngIf="metodo === 'orden'">
        <div class="form-group slide-in">
          <div class="label-container">
            <span class="label-main">¿Orden para pasar?</span>
          </div>
        </div>

        <div class="table-container slide-in">
          <table class="simulated-table">
            <thead>
              <tr>
                <th>Grupo</th>
                <th>Prioridad de paso</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let g of [1, 2, 3, 4]">
                <td>Grupo #{{ g }}</td>
                <td>
                  <select class="select-order">
                    <option *ngFor="let n of [1, 2, 3, 4]" [value]="n">{{ n }}°</option>
                  </select>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- VISTA: SORTEO -->
      <div class="method-view" *ngIf="metodo === 'sorteo'">
        <div class="sorteo-header slide-in">
          <button class="btn-sortear" (click)="ejecutarSorteo()">
            <span class="material-symbols-outlined">casino</span> ¡Sortear!
          </button>
        </div>
        <div class="table-container slide-in">
          <table class="simulated-table">
            <thead>
              <tr>
                <th>Grupo</th>
                <th>Resultado Sorteo</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let g of gruposSimulados">
                <td>Grupo #{{ g.id }}</td>
                <td class="result-cell">{{ g.resultado || '-' }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <button class="btn-finish" *ngIf="metodo">Terminado</button>
  </section>

  <!-- Panel de Salas -->
  <aside class="rooms-section">
    <div class="rooms-header">Salas</div>
    <div class="room-item" *ngFor="let i of [1, 2, 3, 4]">
      <span class="room-name">Grupo #{{ i }}</span>
      <div class="status-container">
        <span class="status-badge" [class.transmitting]="i === 1" [class.waiting]="i !== 1">
          {{ i === 1 ? 'Transmitiendo' : 'En Espera' }}
        </span>
        <a *ngIf="i === 1" class="btn-enter" routerLink="/transmission-live">Entrar</a>
      </div>
    </div>
  </aside>
</div>
